<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  <circle cx="256" cy="256" r="240" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.3" />

  <!-- Sage leaf / brain shape -->
  <!-- Central leaf -->
  <path d="M256 120 C200 160, 160 220, 180 290 C190 320, 220 340, 256 350 C292 340, 322 320, 332 290 C352 220, 312 160, 256 120Z" fill="url(#leaf)" opacity="0.9"/>

  <!-- Leaf veins (neural pathways) -->
  <path d="M256 140 L256 330" stroke="#0f4c2e" stroke-width="3" opacity="0.5"/>
  <path d="M256 190 L215 230" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>
  <path d="M256 190 L297 230" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>
  <path d="M256 240 L205 275" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>
  <path d="M256 240 L307 275" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>
  <path d="M256 280 L225 310" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>
  <path d="M256 280 L287 310" stroke="#0f4c2e" stroke-width="2" opacity="0.4"/>

  <!-- Feedback loop arrows (circular) -->
  <!-- Right arc -->
  <path d="M340 180 A120 120 0 0 1 340 340" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrow head right -->
  <polygon points="335,340 345,340 340,355" fill="#86efac" opacity="0.7"/>

  <!-- Left arc -->
  <path d="M172 340 A120 120 0 0 1 172 180" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrow head left -->
  <polygon points="167,180 177,180 172,165" fill="#86efac" opacity="0.7"/>

  <!-- Neural nodes -->
  <circle cx="256" cy="155" r="8" fill="#86efac" opacity="0.9"/>
  <circle cx="215" cy="230" r="6" fill="#86efac" opacity="0.7"/>
  <circle cx="297" cy="230" r="6" fill="#86efac" opacity="0.7"/>
  <circle cx="205" cy="275" r="5" fill="#86efac" opacity="0.6"/>
  <circle cx="307" cy="275" r="5" fill="#86efac" opacity="0.6"/>
  <circle cx="256" cy="330" r="7" fill="#86efac" opacity="0.8"/>

  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#e2e8f0" letter-spacing="8">SAGE</text>
</svg>
